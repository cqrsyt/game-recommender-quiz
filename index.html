<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桌游乐园</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background: #0a2540; color: #fff; text-align:center; }
        .container { max-width: 900px; margin: 0 auto; background: #112b4f; padding: 40px; border-radius: 15px; }
        button { padding: 15px 30px; margin: 10px; background: #00b4d8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .card { background: #1e3a5f; margin: 15px; padding: 20px; border-radius: 10px; display: inline-block; width: 280px; vertical-align: top; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 桌游乐园</h1>
        <p>测验推荐 • 规则 • 多人房间</p>
        
        <div id="quiz">
            <h2>问题1: 喜欢几人玩？</h2>
            <button onclick="answer()">2人策略</button>
            <button onclick="answer()">多人社交</button>
        </div>
        
        <div id="results" style="display:none;">
            <h2>推荐：国际象棋</h2>
            <div class="card">
                <button onclick="alert('打开规则 & 教程')">📜 详细规则 & AI教程</button>
                <button onclick="createRoom()">创建房间分享</button>
            </div>
        </div>
    </div>

    <script>
        function answer() {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'block';
        }
        function createRoom() {
            alert('房间创建！分享链接： https://cqrsyt.github.io/game-recommender-quiz/?room=test123');
        }
    </script>
</body>
</html>
